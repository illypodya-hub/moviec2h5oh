            font-size: 2.2em;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px #000;
            position: relative;
            color: #ff4500;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.08);
            border-color: #ff4500;
            box-shadow: 0 20px 50px rgba(255,69,0,0.6);
            background: rgba(50, 50, 50, 0.95);
        }
        .card span {

        .action-row {
