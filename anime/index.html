            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            display: block;
            position: relative;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(255,69,0,0.5);
        }
        .anime-poster {
            width: 100%;
            height: 400px;           /* фиксированная высота, как в фильмах */

        .back-btn {

            text-decoration: none;
            border: 2px solid #ff4500;
            padding: 15px 40px;

        .back-btn:hover {
