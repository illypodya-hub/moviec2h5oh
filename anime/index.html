<!DOCTYPE html>

            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
        }
        .overlay {
            background: rgba(10, 10, 10, 0.78);
            min-height: 100vh;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }
        h1 {
            font-size: 3.5em;
            font-weight: bold;
            text-shadow: 0 0 25px #ff4500;
            color: #ff4500;
            margin: 0;
        }
        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
            margin: 8px 0 5px;
        }
        .social {
            position: absolute;
            top: 30px;
            right: 40px;
            text-align: center;
        }
        .social-link {
            color: white;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .social-link:hover { color: #ff4500; transform: scale(1.1); }
        .social-emoji { font-size: 2.2em; margin-bottom: 3px; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .anime-card {
            background: rgba(30, 30, 30, 0.85);
            border: 2px solid #333;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            display: block;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(255,69,0,0.5);
        }
        .anime-poster {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: #111;
            display: block;
        }
        .anime-info {
            padding: 20px;
            text-align: center;
        }
        .anime-title {
            font-size: 1.8em;
            margin: 0 0 10px;
            color: #ff4500;
        }
        .watch-btn {
            display: inline-block;
            background: #ff4500;
            color: white;
            font-size: 1.2em;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .watch-btn:hover {
            background: #ff6600;
        }
        .back-btn {
            margin: 40px 0;
            color: #ff4500;
            font-size: 1.6em;
            text-decoration: none;
            border: 2px solid #ff4500;
            padding: 15px 40px;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,69,0,0.2);
        }
        footer {
            text-align: center;
            padding: 20px 0;
            font-size: 1em;
            opacity: 0.7;
        }

        /* Мобильные */
        @media (max-width: 768px) {
            header { padding: 60px 0 20px; }
            h1 { font-size: 2.6em; }
            .subtitle { font-size: 1.1em; }
            .social { top: 20px; right: 20px; }
            .social-emoji { font-size: 2em; }
            .anime-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
            .anime-poster { height: 300px; }
            .anime-title { font-size: 1.6em; }
            .back-btn { font-size: 1.4em; padding: 12px 30px; }
        }
    </style>
</head>
