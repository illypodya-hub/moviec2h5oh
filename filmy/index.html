<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмы - Movie C2H5OH</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
        }
        .overlay {
            background: rgba(10, 10, 10, 0.78);
            min-height: 100vh;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }
        h1 {
            font-size: 3.5em;
            font-weight: bold;
            text-shadow: 0 0 25px #ff4500;
            color: #ff4500;
            margin: 0;
        }
        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
            margin: 8px 0 5px;
        }
        .social {
            position: absolute;
            top: 30px;
            right: 40px;
            text-align: center;
        }
        .social-link {
            color: white;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .social-link:hover { color: #ff4500; transform: scale(1.1); }
        .social-emoji { font-size: 2.2em; margin-bottom: 3px; }
        .films-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .film-card {
            background: rgba(30, 30, 30, 0.85);
            border: 2px solid #333;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            display: block;
            cursor: pointer;
        }
        .film-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(255,69,0,0.5);
        }
        .film-poster {
